<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント設定 | SEO Scan</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="/css/tailwind.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        .oe-card { border-radius: 16px; background: #ffffff; border: 1px solid #f1f5f9; box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
        .oe-input { border: 1px solid #e2e8f0; border-radius: 10px; transition: all 0.2s; }
        .oe-input:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08); }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
    </style>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#4f46e5">
</head>
<body class="text-slate-900 antialiased bg-slate-50/30 min-h-screen flex flex-col">

    <div id="header-container"></div>

    <main class="flex-grow max-w-2xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 lg:py-12">
        <div class="oe-card p-8 sm:p-10">
            <div class="flex flex-col items-center mb-10">
                <div id="drop-zone" onclick="document.getElementById('avatar-input').click()" class="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center cursor-pointer overflow-hidden border-2 border-dashed border-slate-200 hover:border-blue-400 transition-all">
                    <div id="avatar-preview" class="w-full h-full flex items-center justify-center text-3xl">👤</div>
                </div>
                <input type="file" id="avatar-input" class="hidden" accept="image/*">
                <p class="text-[10px] text-slate-400 mt-2 font-bold uppercase">Click to change photo</p>
                <p class="text-[10px] text-slate-400 mt-1">Email: <span id="user-email"></span></p>
                <p class="text-[10px] text-slate-400">Role: <span id="user-role"></span></p>
                <input type="text" id="display-name" class="oe-input w-full max-w-xs mt-6 px-4 py-2 text-center font-bold" placeholder="表示名を入力">
            </div>

            <div class="space-y-4 pt-6">
                <button id="save-settings" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl text-xs tracking-[0.2em] uppercase hover:bg-blue-600 transition shadow-lg active:scale-95">設定を保存する</button>
                <a href="seo.html" class="block text-center w-full bg-white text-slate-700 border border-slate-200 font-bold py-4 rounded-xl text-xs tracking-[0.2em] uppercase hover:bg-slate-100 transition">
                    プロジェクト一覧へ戻る
                </a>
            </div>
        </div>
    </main>

    <script src="/js/header.js?v=9"></script>
    <script src="/js/settings.js"></script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});</script>
</body>
</html>
