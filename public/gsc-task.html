<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASK | Search Console - SEO Scan</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="/css/tailwind.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #f1f5f9; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* タスクリスト視認性向上 */
        #action-item-list-container {
          font-size: 15px;
        }
        /* タスクタイトル */
        #action-item-list-container .text-xs.font-medium {
          font-size: 15px !important;
          font-weight: 600;
          line-height: 1.5;
        }
        /* 説明文 */
        #action-item-list-container .text-\[11px\] {
          font-size: 13px !important;
          line-height: 1.7;
        }
        /* バッジ・ラベル (10px → 12px) */
        #action-item-list-container .text-\[10px\] {
          font-size: 12px !important;
        }
        /* カテゴリフィルターボタン */
        #action-item-list-container button[data-category] {
          font-size: 13px !important;
          padding: 6px 14px;
        }
        /* セクションラベル */
        #action-item-list-container .uppercase.tracking-wider,
        #action-item-list-container .uppercase.tracking-widest {
          font-size: 13px !important;
        }
        /* カードのパディング拡大 */
        #action-item-list-container .rounded-r-xl {
          padding: 16px !important;
        }
        /* チェックボックス */
        #action-item-list-container input[type="checkbox"] {
          width: 20px;
          height: 20px;
          margin-top: 2px;
        }
        /* リンク・ボタン */
        #action-item-list-container a,
        #action-item-list-container button[data-confirm-complete-id],
        #action-item-list-container button[data-undo-id] {
          font-size: 13px !important;
        }
        #action-item-list-container button[data-confirm-complete-id] {
          padding: 6px 14px !important;
          border-radius: 8px;
        }
        /* 完了済みセクション */
        #action-item-list-container button[data-action="toggle-completed"] {
          font-size: 14px !important;
        }
        #action-item-list-container .line-through {
          font-size: 14px !important;
        }
        /* フッター表示件数 */
        #action-item-list-container button[data-action="load-more"] {
          font-size: 14px !important;
          padding: 14px !important;
        }
        /* 再生成ボタン */
        #action-item-list-container button[data-action="regenerate"] {
          font-size: 14px !important;
          padding: 10px 20px !important;
        }
        /* 空状態・ローディング */
        #action-item-list-container .text-sm {
          font-size: 15px !important;
        }

        @media (max-width: 640px) {
          #action-item-list-container .text-xs.font-medium {
            font-size: 14px !important;
          }
          #action-item-list-container .text-\[11px\] {
            font-size: 13px !important;
          }
          #action-item-list-container .rounded-r-xl {
            padding: 14px 12px !important;
          }
        }
    </style>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#4f46e5">
</head>
<body class="text-slate-900 antialiased bg-slate-50/30 min-h-screen flex flex-col">

    <div id="header-container"></div>

    <main class="flex-grow max-w-[1400px] mx-auto w-full px-4 sm:px-6 lg:px-8 py-6 lg:py-8 space-y-8">

        <!-- 今週やるべきこと -->
        <div id="action-item-list-container" class="mb-6">
            <div class="p-4 text-center text-sm text-slate-500" id="action-item-list-placeholder">読み込み中...</div>
        </div>
    </main>

    <script src="/js/header.js?v=10"></script>
    <script src="/js/action-item-list.js"></script>
    <script src="/js/gsc-task.js"></script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});</script>
</body>
</html>
