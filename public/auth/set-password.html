<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワード設定 | SEO Scan by DIGITALEYES</title>
  <link rel="stylesheet" href="/css/style.css?v=1">
  <link rel="stylesheet" href="/css/tailwind.css">
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-50">
  <div class="max-w-md w-full">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 px-3 py-1 rounded-md bg-slate-200 text-slate-600 text-[10px] font-black uppercase tracking-widest mb-4">DIGITALEYES</div>
      <h1 class="text-2xl font-black tracking-tight text-slate-900">パスワードを設定</h1>
      <p class="text-sm text-slate-500 mt-2">招待メールのリンクからアクセスしました。<br>ログイン用のパスワードを設定してください。</p>
    </div>
    <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-xl">
      <form id="set-password-form" class="space-y-6">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">新しいパスワード</label>
          <input type="password" id="password" name="password" required minlength="6"
            class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold"
            placeholder="6文字以上">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">パスワード（確認）</label>
          <input type="password" id="passwordConfirm" name="password_confirm" required minlength="6"
            class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold"
            placeholder="再度入力">
        </div>
        <div id="error-msg" class="text-red-600 text-sm hidden"></div>
        <button type="submit" id="submit-btn"
          class="w-full py-4 bg-slate-900 text-white rounded-xl font-black text-sm tracking-widest uppercase hover:bg-indigo-600 transition">
          パスワードを設定してログイン
        </button>
      </form>
    </div>
  </div>
  <script src="/js/auth/set-password.js"></script>
</body>
</html>
