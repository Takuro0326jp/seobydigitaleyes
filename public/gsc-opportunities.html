<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunities | Search Console - SEO Scan</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="/css/tailwind.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #f1f5f9; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#4f46e5">
</head>
<body class="text-slate-900 antialiased bg-slate-50/30 min-h-screen flex flex-col">

    <div id="header-container"></div>

    <main class="flex-grow max-w-[1400px] mx-auto w-full px-4 sm:px-6 lg:px-8 py-6 lg:py-8 space-y-8">

        <!-- 更新ボタン -->
        <div class="flex items-center justify-end gap-3">
            <span id="gsc-cache-label" class="text-[10px] text-amber-500 font-bold"></span>
            <button id="refresh-btn" onclick="window.refreshGSCData && window.refreshGSCData()" class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-xl text-[12px] font-black hover:bg-indigo-700 transition-all shadow-md active:scale-95 whitespace-nowrap">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                最新データに更新
            </button>
        </div>

        <!-- 空状態 -->
        <div id="emptyState" class="flex flex-col items-center justify-center py-20 text-center">
            <div class="w-20 h-20 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-400 mb-6">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
            </div>
            <p class="text-sm font-black text-slate-700">GSC API 未接続</p>
            <p class="text-xs text-slate-500 mt-2 max-w-md">seo.html の設定から「Google で連携」を行い、プロパティを選択してください。</p>
            <a href="/seo.html" class="mt-6 px-6 py-3 bg-indigo-600 text-white rounded-xl text-xs font-black hover:bg-indigo-700">設定へ</a>
        </div>

        <!-- コンテンツ（GSC接続時） -->
        <div id="opportunitiesContent" class="hidden space-y-10">
            <!-- セクション1: CTR改善機会 -->
            <section>
                <h2 class="text-lg font-black text-slate-900 mb-4">CTR改善機会</h2>
                <p class="text-xs text-slate-500 mb-4">表示回数100以上・CTR 2%未満のページ</p>
                <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto max-h-[400px] scrollbar-thin">
                        <table class="w-full text-left min-w-[700px]">
                            <thead class="sticky top-0 bg-slate-50 border-b border-slate-200 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <tr>
                                    <th class="p-4">URL</th>
                                    <th class="p-4">主要クエリ</th>
                                    <th class="p-4 text-right">表示回数</th>
                                    <th class="p-4 text-right">CTR</th>
                                    <th class="p-4 text-right">平均順位</th>
                                    <th class="p-4">改善案</th>
                                    <th class="p-4 w-32"></th>
                                </tr>
                            </thead>
                            <tbody id="ctrOpportunitiesBody" class="text-[12px] divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
                <p id="ctrEmpty" class="hidden py-8 text-center text-slate-400 text-sm">該当なし</p>
            </section>

            <!-- セクション2: 順位引き上げ機会 -->
            <section>
                <h2 class="text-lg font-black text-slate-900 mb-4">順位引き上げ機会</h2>
                <p class="text-xs text-slate-500 mb-4">平均順位11〜20位・表示回数50以上のページ</p>
                <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto max-h-[400px] scrollbar-thin">
                        <table class="w-full text-left min-w-[600px]">
                            <thead class="sticky top-0 bg-slate-50 border-b border-slate-200 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <tr>
                                    <th class="p-4">URL</th>
                                    <th class="p-4 text-right">平均順位</th>
                                    <th class="p-4 text-right">クリック</th>
                                    <th class="p-4 text-right">表示回数</th>
                                    <th class="p-4">推奨アクション</th>
                                    <th class="p-4 w-32"></th>
                                </tr>
                            </thead>
                            <tbody id="rankOpportunitiesBody" class="text-[12px] divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
                <p id="rankEmpty" class="hidden py-8 text-center text-slate-400 text-sm">該当なし</p>
            </section>

            <!-- セクション3: 未対策キーワード -->
            <section>
                <h2 class="text-lg font-black text-slate-900 mb-4">未対策キーワード</h2>
                <p class="text-xs text-slate-500 mb-4">表示回数100以上で対応ページが少ないクエリ</p>
                <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto max-h-[400px] scrollbar-thin">
                        <table class="w-full text-left min-w-[500px]">
                            <thead class="sticky top-0 bg-slate-50 border-b border-slate-200 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <tr>
                                    <th class="p-4">クエリ</th>
                                    <th class="p-4 text-right">表示回数</th>
                                    <th class="p-4">推奨アクション</th>
                                    <th class="p-4 w-32"></th>
                                </tr>
                            </thead>
                            <tbody id="untargetedBody" class="text-[12px] divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
                <p id="untargetedEmpty" class="hidden py-8 text-center text-slate-400 text-sm">該当なし</p>
            </section>
        </div>
    </main>

    <script src="/js/header.js?v=12"></script>
    <script src="/js/gsc-opportunities.js"></script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});</script>
</body>
</html>
