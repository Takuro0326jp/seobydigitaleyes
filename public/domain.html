<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Authority | SEO Scan</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="/css/tailwind.css" rel="stylesheet">
    <link href="/css/domain.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }</style>
</head>
<body class="text-slate-900 antialiased bg-slate-50/30 min-h-screen flex flex-col">

    <div id="header-container"></div>

    <main class="domain-page flex-grow max-w-[1000px] mx-auto w-full px-4 sm:px-6 lg:px-8 py-6 lg:py-8 space-y-8">
        <div>
            <h1 class="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight">Domain Authority</h1>
            <p id="displayUrl" class="text-xs text-slate-400 font-medium mt-1">---</p>
        </div>

        <!-- ① ヒーローエリア -->
        <section id="js-domain-hero" class="hero"></section>

        <!-- ② スコア内訳 -->
        <section>
            <div class="section-label">スコア内訳</div>
            <div id="js-score-breakdown" class="score-grid"></div>
        </section>

        <!-- ③ 改善アクション -->
        <section>
            <div class="section-label">改善アクション</div>
            <div id="js-issues" class="space-y-0"></div>
        </section>

        <!-- ④ 重要ページ一覧 -->
        <section>
            <div class="section-label" style="margin-top:0">重要ページ一覧</div>
            <div class="flex flex-wrap items-center justify-between gap-4 mb-3">
                <div class="tab-row">
                    <button type="button" class="tab-btn active" data-tab="high">高権威ページ</button>
                    <button type="button" class="tab-btn" data-tab="orphan">孤立ページ（<span id="js-orphan-count">0</span>件）</button>
                </div>
                <button type="button" id="js-export-orphan-csv" class="text-xs font-bold text-slate-600 hover:text-slate-800 px-3 py-1.5 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 transition">CSVエクスポート</button>
            </div>

            <div id="tab-high" class="overflow-x-auto">
                <table class="pages-table">
                    <thead>
                        <tr>
                            <th style="width:40px">#</th>
                            <th>ページ</th>
                            <th style="width:120px">内部被リンク数</th>
                            <th style="width:100px">PageRank</th>
                            <th style="width:80px">評価</th>
                        </tr>
                    </thead>
                    <tbody id="js-high-authority-body"></tbody>
                </table>
                <button type="button" id="js-show-more-high" class="text-xs font-bold text-slate-600 hover:text-slate-800 mt-2 py-1 hidden">もっと見る</button>
            </div>

            <div id="tab-orphan" style="display:none" class="overflow-x-auto">
                <table class="pages-table">
                    <thead>
                        <tr>
                            <th>ページ</th>
                            <th style="width:100px">クロール深さ</th>
                            <th style="width:100px">PageRank</th>
                            <th style="width:140px">推奨アクション</th>
                        </tr>
                    </thead>
                    <tbody id="js-orphan-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="/js/header.js?v=2"></script>
    <script src="/js/domain.js"></script>
</body>
</html>
