<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理コンソール | SEO Scan</title>
  <link href="/css/tailwind.css" rel="stylesheet">
  <style>
    /* フォントの滑らかさとカスタムカラーの微調整 */
    body { 
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    /* アクティブなナビゲーションのスタイル */
    .nav-active { 
      background-color: #f5f7ff; 
      color: #4f46e5; 
      font-weight: 600;
      box-shadow: inset 4px 0 0 0 #4f46e5; /* 左側にアクセントライン */
    }
    .nav-item { transition: all 0.2s ease; }
    .nav-icon { width: 1.25rem; height: 1.25rem; flex-shrink: 0; }
    .nav-active .nav-icon { filter: invert(31%) sepia(98%) saturate(1838%) hue-rotate(228deg) brightness(97%) contrast(101%); }
  </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">
  <div class="flex">
    <aside class="w-64 bg-white border-r border-slate-200 h-screen sticky top-0 flex flex-col shadow-sm">
      <div class="p-8">
        <div class="flex items-center gap-3">
          <img src="/img/d_logo.png" alt="" class="w-10 h-10 object-contain rounded-lg flex-shrink-0" onerror="this.style.display='none'">
          <div>
            <h1 class="text-base font-bold tracking-tight text-slate-800 leading-none">管理コンソール</h1>
            <p class="text-[10px] uppercase tracking-widest text-slate-400 mt-1 font-semibold">SEO SCAN ADMIN</p>
          </div>
        </div>
      </div>

      <nav class="flex-1 px-3 space-y-1 overflow-y-auto min-h-0">
        <p class="px-4 text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-2">Main Menu</p>
        <a href="#/" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-md text-slate-500 hover:bg-slate-50 hover:text-slate-900 nav-active" data-route="/">
          <img src="/img/admin/chart-bar.svg" alt="" class="nav-icon">
          <span class="text-sm">ダッシュボード</span>
        </a>
        <a href="#/users" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-md text-slate-500 hover:bg-slate-50 hover:text-slate-900" data-route="/users">
          <img src="/img/admin/users.svg" alt="" class="nav-icon">
          <span class="text-sm">ユーザー管理</span>
        </a>
        <a href="#/companies" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-md text-slate-500 hover:bg-slate-50 hover:text-slate-900" data-route="/companies">
          <img src="/img/admin/building.svg" alt="" class="nav-icon">
          <span class="text-sm">企業管理</span>
        </a>
        <a href="#/scans" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-md text-slate-500 hover:bg-slate-50 hover:text-slate-900" data-route="/scans">
          <img src="/img/admin/magnifying-glass.svg" alt="" class="nav-icon">
          <span class="text-sm">スキャン管理</span>
        </a>
        <a href="#/link-analysis" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-md text-slate-500 hover:bg-slate-50 hover:text-slate-900" data-route="/link-analysis">
          <img src="/img/admin/link.svg" alt="" class="nav-icon">
          <span class="text-sm">リンク分析</span>
        </a>
      </nav>

      <div class="p-4 border-t border-slate-100 bg-slate-50/50">
        <a href="/seo.html" class="flex items-center justify-center gap-2 px-4 py-2 text-xs font-medium text-slate-500 border border-slate-200 bg-white rounded-lg hover:border-indigo-300 hover:text-indigo-600 shadow-sm transition-all">
          <img src="/img/admin/arrow-left.svg" alt="" class="w-3 h-3">
          サイト一覧に戻る
        </a>
      </div>
    </aside>

    <main class="flex-1 p-10">
      <div class="max-w-6xl mx-auto">
        <div id="admin-content" class="min-h-[calc(100vh-5rem)]">
          <div class="animate-pulse flex flex-col gap-4">
            <div class="h-8 bg-slate-200 rounded w-1/4"></div>
            <div class="h-64 bg-white rounded-xl border border-slate-200 shadow-sm"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/admin/js/init.js"></script>
</body>
</html>
