<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理コンソール | SEO Scan</title>
  <link href="/css/tailwind.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-font-smoothing: antialiased; }
    .nav-active { background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%) !important; color: white !important; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25); }
    .nav-item { transition: all 0.2s ease; }
  </style>
</head>
<body class="text-slate-900 min-h-screen">
  <div class="flex">
    <aside class="w-72 bg-white border-r border-slate-200/60 h-screen sticky top-0 flex flex-col">
      <div class="p-8 mb-4 shrink-0">
        <div class="flex items-center gap-4">
          <img src="/img/d_logo.png" alt="SEO Scan" class="w-11 h-11 shrink-0 object-contain" onerror="this.style.display='none'">
          <div class="min-w-0 flex-1">
            <h1 class="text-lg font-bold tracking-tight text-slate-800 leading-tight">SEO Scan</h1>
            <p class="text-[10px] uppercase tracking-[0.15em] text-slate-400 font-bold">Admin Console</p>
          </div>
        </div>
      </div>
      <nav class="flex-1 px-4 space-y-1.5">
        <a href="#/" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 transition-all" data-route="/">
          <span class="text-sm font-medium">ダッシュボード</span>
        </a>
        <a href="#/users" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 transition-all" data-route="/users">
          <span class="text-sm font-medium">ユーザー管理</span>
        </a>
        <a href="#/companies" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 transition-all" data-route="/companies">
          <span class="text-sm font-medium">企業管理</span>
        </a>
        <a href="#/scans" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 transition-all" data-route="/scans">
          <span class="text-sm font-medium">スキャン管理</span>
        </a>
        <a href="#/link-analysis" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 transition-all" data-route="/link-analysis">
          <span class="text-sm font-medium">リンク分析</span>
        </a>
      </nav>
      <div class="p-4 border-t border-slate-100">
        <a href="/seo.html" class="flex items-center justify-center gap-2 px-4 py-2 text-xs font-medium text-slate-500 border border-slate-200 bg-white rounded-xl hover:border-indigo-300 hover:text-indigo-600 shadow-sm transition-all">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          サイト一覧に戻る
        </a>
      </div>
    </aside>

    <main class="flex-1 p-10">
      <div class="max-w-7xl mx-auto">
        <div id="admin-content" class="min-h-[calc(100vh-5rem)]">
          <div class="animate-pulse flex flex-col gap-4">
            <div class="h-8 bg-slate-200 rounded w-1/4"></div>
            <div class="h-64 bg-white rounded-2xl border border-slate-200/60 shadow-sm"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/admin/js/init.js?v=2"></script>
</body>
</html>
