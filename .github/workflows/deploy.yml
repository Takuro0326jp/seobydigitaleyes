# main ブランチへの push で SSH デプロイ
# 必要な GitHub Secrets:
#   DEPLOY_HOST    - サーバーのホスト名 or IP
#   DEPLOY_USER    - SSH ユーザー名
#   DEPLOY_SSH_KEY - 秘密鍵（全文）
#   DEPLOY_PATH    - デプロイ先パス（任意・デフォルト: ~/seoscan）
#   DEPLOY_PORT    - SSH ポート（任意・デフォルト: 22）
# 事前: サーバーで git clone し、.env を配置、pm2 をインストール
# DNS: 公開ドメインの A レコードは DEPLOY_HOST（Elastic IP）を指すこと。
#      別 IP（CDN のエッジのみ等）のままだと EC2 上のアプリに届かない。Route 53 なら scripts/route53-upsert-a.sh を参照。
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # デプロイは SSH 先で npm ci のみ実行。Runner 側の npm ci は本番コードに不要かつ時間がかかり、失敗ポイントになるため省略。

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          command_timeout: 30m
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '~/seoscan' }}
            git fetch origin main && git reset --hard origin/main
            npm ci --omit=dev
            pm2 restart seoscan 2>/dev/null || pm2 start server.js --name seoscan
            pm2 save
