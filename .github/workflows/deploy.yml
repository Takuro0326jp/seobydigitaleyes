# main ブランチへの push で SSH デプロイ
# 必要な GitHub Secrets:
#   DEPLOY_HOST    - サーバーのホスト名 or IP
#   DEPLOY_USER    - SSH ユーザー名
#   DEPLOY_SSH_KEY - 秘密鍵（全文）
#   DEPLOY_PATH    - デプロイ先パス（任意・デフォルト: ~/seoscan）
#   DEPLOY_PORT    - SSH ポート（任意・デフォルト: 22）
# 事前: サーバーで git clone し、.env を配置、pm2 をインストール
# DNS: 公開ドメインの A レコードは DEPLOY_HOST（Elastic IP）を指すこと。
#      別 IP（CDN のエッジのみ等）のままだと EC2 上のアプリに届かない。Route 53 なら scripts/route53-upsert-a.sh を参照。
# nginx: 巨大 JSON が ERR_CONTENT_LENGTH_MISMATCH になるときは upstream 側へ
#   proxy_buffering off; および proxy_buffers / proxy_busy_buffers を十分にすることを推奨。
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_DIR: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # DEPLOY_SSH_KEY は run スクリプトへ直書きしない（複数行で壊れる）。
      # 「サーバーホストが見つかりません」= DEPLOY_HOST Secret が空（appleboy / drone-ssh の典型メッセージ）
      # 設定場所：リポジトリ Settings → Secrets and variables → Actions（Environment だけではこの job には届かない）
      # デプロイは SSH 先で npm ci のみ実行。

      - name: Require DEPLOY_HOST and DEPLOY_USER
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "::error::DEPLOY_HOST が未設定または空です → appleboy は「サーバーホストが見つかりません」で失敗します。Settings → Secrets and variables → Actions に EC2 の IP または公開 DNS を登録してください。"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "::error::DEPLOY_USER が未設定または空です。"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ env.SSH_PORT || '22' }}
          command_timeout: 30m
          script: |
            set -e
            if [ -f "$HOME/.nvm/nvm.sh" ]; then
              . "$HOME/.nvm/nvm.sh"
            fi
            if [ -z "${{ env.DEPLOY_DIR }}" ]; then
              cd ~/seoscan
            else
              cd "${{ env.DEPLOY_DIR }}"
            fi
            echo "Deploy dir: $(pwd)"
            command -v git >/dev/null || { echo "ERROR: git が見つかりません"; exit 1; }
            command -v npm >/dev/null || { echo "ERROR: npm が見つかりません（Node を PATH に載せてください）"; exit 1; }
            git fetch origin main && git reset --hard origin/main
            npm ci --omit=dev
            if command -v pm2 >/dev/null 2>&1; then
              pm2 restart seoscan 2>/dev/null || pm2 start server.js --name seoscan
              pm2 save
            elif [ -x "$HOME/.npm-global/bin/pm2" ]; then
              "$HOME/.npm-global/bin/pm2" restart seoscan 2>/dev/null || "$HOME/.npm-global/bin/pm2" start server.js --name seoscan
              "$HOME/.npm-global/bin/pm2" save
            else
              echo "ERROR: pm2 が見つかりません（グローバル install か PATH を確認してください）"
              exit 1
            fi
            _port="$(node -e 'require("dotenv").config({ path: ".env" }); process.stdout.write(String(process.env.PORT || "3000"));' 2>/dev/null || echo 3000)"
            echo "Post-deploy ping: GET http://127.0.0.1:${_port}/api/ping"
            curl -fsS --max-time 15 "http://127.0.0.1:${_port}/api/ping" >/dev/null
